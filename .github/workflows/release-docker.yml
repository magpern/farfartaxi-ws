name: Release Docker images

on:
  push:
    tags:
      - "v*"

env:
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner (GHCR)
        id: o
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Checkout frontend (same tag)
        id: web-tag
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: magpern/farfartaxi-web
          path: farfartaxi-web
          ref: ${{ github.ref_name }}

      - name: Checkout frontend (main fallback)
        if: steps.web-tag.outcome != 'success'
        continue-on-error: true
        id: web-main
        uses: actions/checkout@v4
        with:
          repository: magpern/farfartaxi-web
          path: farfartaxi-web
          ref: main

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ghcr.io/${{ steps.o.outputs.owner }}/farfartaxi-backend:${{ github.ref_name }}
            ghcr.io/${{ steps.o.outputs.owner }}/farfartaxi-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: hashFiles('farfartaxi-web/package.json') != ''
        uses: docker/build-push-action@v6
        with:
          context: farfartaxi-web
          file: farfartaxi-web/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ghcr.io/${{ steps.o.outputs.owner }}/farfartaxi-frontend:${{ github.ref_name }}
            ghcr.io/${{ steps.o.outputs.owner }}/farfartaxi-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
