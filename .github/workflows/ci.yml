name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: ./mvnw -B verify

  # Builds public magpern/farfartaxi-web@main (sibling repo). Marked optional until that repo exists.
  frontend:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          repository: magpern/farfartaxi-web
          path: farfartaxi-web
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        working-directory: farfartaxi-web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build
