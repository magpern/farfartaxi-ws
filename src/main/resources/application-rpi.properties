# Profile for Raspberry Pi / Docker Compose deployments (activate with SPRING_PROFILES_ACTIVE=rpi).
# Security and API diagnostics are always logged at WARN from the custom handlers; this profile adds
# optional tuning without editing code.

# Broader app package DEBUG when troubleshooting (override in compose: LOGGING_LEVEL_COM_FARFARTAXI=DEBUG)
logging.level.com.farfartaxi=INFO

# Web request dispatch (verbose; enable only while debugging)
# logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
