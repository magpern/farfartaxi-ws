spring.application.name=farfartaxi-backend

# Console logging (default is stdout; no file appender unless you add logback-spring.xml)
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.farfartaxi=INFO

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/farfartaxi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taxi_mgmt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

app.jwt.secret=${APP_JWT_SECRET:replace-this-in-production-with-a-long-secret-value}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:720}

# Google Sign-In (browser ID token). Public client id; set GOOGLE_CLIENT_ID in production.
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.admin.email=${FARFARTAXI_ADMIN_EMAIL:admin@farfartaxi.local}
app.admin.password=${FARFARTAXI_ADMIN_PASSWORD:}
app.admin.name=${FARFARTAXI_ADMIN_NAME:Farfar Admin}
app.eta.default-kmh=${APP_ETA_DEFAULT_KMH:35}

app.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.vapid.subject=${VAPID_SUBJECT:mailto:admin@farfartaxi.local}

# Driving directions proxy (OSRM). Default: public demo. Override: app.routing.osrm-base-url=https://your-osrm.example Optional: app.routing.osrm-min-interval-ms=400
